<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBM - Vídeos_Partituras</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #18bc9c;
            --bg-color: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            position: relative;
        }

        /* Botão para Recolher/Expandir o Filtro */
        .btn-toggle-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background-color: var(--primary-color);
            color: white;
            border: 2px solid var(--accent-color);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-toggle-sidebar:hover {
            background-color: var(--accent-color);
        }

        /* Coluna Esquerda - Filtros e Busca */
        aside {
            width: 320px; 
            min-width: 280px;
            max-width: 500px;
            background-color: var(--primary-color);
            color: white;
            padding: 80px 15px 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
            flex-shrink: 0;
            transition: margin-left 0.3s ease, visibility 0.3s ease;
        }

        aside.collapsed {
            margin-left: -320px;
            visibility: hidden;
        }

        aside h1 { text-align: center; margin-bottom: 10px; }
        aside h2, aside h3 {
            font-size: 1.3rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            margin-top: 5px;
        }

        aside h3 {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #ecf0f1;
        }

        input[type="text"], select {
            padding: 8px 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
            user-select: text;
        }

        input[type="text"]:focus, select:focus {
            outline: 2px solid var(--accent-color);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .btn-clear:hover { background-color: #c0392b; }

        /* Fila de Reprodução na Sidebar */
        .playlist-vertical-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .playlist-actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .playlist-actions-grid button, .btn-import-label {
            background-color: #34495e;
            color: white;
            border: 1px solid #7f8c8d;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            display: block;
        }
        .playlist-actions-grid button:hover, .btn-import-label:hover { 
            background-color: var(--accent-color); 
        }

        .playlist-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #34495e;
        }

        .playlist-item {
            background-color: #34495e;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }

        .playlist-item.active {
            border-color: #e67e22;
            background-color: #d35400;
        }

        .playlist-item .item-text {
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .playlist-item .remove-item {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            padding: 0 4px;
        }

        /* Barra de Redimensionamento */
        .resizer {
            width: 8px;
            background-color: #bdc3c7;
            cursor: col-resize;
            transition: background-color 0.2s;
            flex-shrink: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .resizer:hover, .resizer.dragging { background-color: var(--accent-color); }

        /* Área Principal da Tela */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        main {
            flex: 1;
            padding: 30px 30px 30px 100px;
            overflow-y: auto;
            user-select: text;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-main h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Botão de toggle entre Grid e Lista */
        .btn-toggle-view {
            background-color: var(--primary-color);
            color: white;
            border: 2px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-toggle-view:hover {
            background-color: var(--accent-color);
        }

        /* ============================================
                   VISUALIZAÇÃO EM GRADE (PADRÃO)
                   ============================================ */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* ============================================
                   VISUALIZAÇÃO EM LISTA (COMPACTA)
                   ============================================ */
        .catalog-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .catalog-list .music-card {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            gap: 15px;
            padding: 8px 15px;
            border-top: 2px solid var(--accent-color);
            border-radius: 4px;
            min-height: 50px;
        }

        .catalog-list .music-card .music-info {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .catalog-list .music-card .music-info h3 {
            font-size: 0.95rem;
            margin-bottom: 0;
            color: var(--primary-color);
        }

        .catalog-list .music-card .music-meta {
            font-size: 0.75rem;
            color: #7f8c8d;
            line-height: 1.2;
        }

        .catalog-list .music-card .music-meta p {
            display: inline;
        }

        .catalog-list .music-card .music-meta .composer-label {
            display: none;
        }

        .catalog-list .music-card .actions {
            display: flex;
            flex-direction: row;
            gap: 6px;
            margin-top: 0;
            justify-content: flex-end;
        }

        .catalog-list .music-card .actions button {
            width: auto;
            padding: 4px 12px;
            font-size: 0.75rem;
            white-space: nowrap;
            border-radius: 3px;
        }

        .catalog-list .music-card .btn-view-pdf {
            background-color: var(--accent-color);
            color: white;
        }

        .catalog-list .music-card .btn-add-playlist {
            background-color: #34495e;
            color: white;
        }

        .catalog-list .music-card .btn-play-now {
            background-color: #e67e22;
            color: white;
        }

        .catalog-list .music-card .btn-play-now:hover {
            background-color: #d35400;
        }

        .catalog-list .music-card.playing-now {
            border-top-color: #e67e22;
            background-color: #fffaf5;
        }

        .music-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            border-top: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: space-between;
        }

        .music-card.playing-now {
            border-top-color: #e67e22;
            background-color: #fffaf5;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.15);
        }

        .music-info h3 {
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 3px;
        }

        .music-meta {
            font-size: 0.85rem;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-view-pdf, .btn-add-playlist, .btn-play-now {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-view-pdf { background-color: var(--accent-color); color: white; }
        .btn-view-pdf:hover { background-color: #149a80; }
        .btn-add-playlist { background-color: #34495e; color: white; }
        .btn-add-playlist:hover { background-color: #212f3d; }
        .btn-play-now { background-color: #e67e22; color: white; }
        .btn-play-now:hover { background-color: #d35400; }

        /* PAINEL HORIZONTAL DO PLAYER */
        .player-horizontal-container {
            height: 160px;
            background-color: #2c3e50;
            border-top: 4px solid #e67e22;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 20px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.15);
            z-index: 30;
        }

        .player-horizontal-info {
            flex: 1;
            color: white;
            min-width: 180px;
        }

        .player-horizontal-info h4 {
            font-size: 1rem;
            color: #e67e22;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-horizontal-info p {
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        .player-horizontal-video-box {
            width: 240px;
            height: 135px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        #youtube-global-player {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Visualizador de PDF Lateral */
        .pdf-preview-panel {
            width: 40%; 
            min-width: 300px;
            max-width: 75%;
            background-color: #2c3e50;
            display: none; 
            flex-direction: column;
            height: 100vh;
            z-index: 5;
            flex-shrink: 0;
        }

        .pdf-preview-header {
            background-color: #34495e;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-preview {
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .pdf-frame { width: 100%; height: 100%; border: none; }
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #7f8c8d; }
        #fileImport { display: none; }

        @media (max-width: 1024px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            aside { width: 100% !important; max-width: none; height: auto; padding-top: 80px; }
            aside.collapsed { margin-left: 0; display: none; }
            .resizer { display: none; }
            main { height: auto; padding-left: 20px; }
            
            .catalog-list .music-card {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 10px 15px;
            }
            .catalog-list .music-card .actions {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .catalog-list .music-card .actions button {
                flex: 1;
                min-width: 80px;
            }
            
            .player-horizontal-container { flex-direction: column; height: auto; align-items: stretch; }
            .player-horizontal-video-box { width: 100%; height: 200px; }
            .pdf-preview-panel { width: 100% !important; max-width: none; height: 600px; }
            .catalog-grid { grid-template-columns: 1fr; }
            
            .header-main {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="Recolher/Expandir Filtros">☰ Filtros</button>

    <aside id="sidebar">
        <h1><img src="imagem/logo1.png" alt="NBM" style="height: 40px; width: auto;"></h1>
        <h2>Filtros e Busca</h2>
         
        <div class="form-group">
            <label for="searchGeneral">Pesquisa Geral:</label>
            <input type="text" id="searchGeneral" placeholder="Título, compositor, livro...">
        </div>

        <div class="form-group">
            <label for="filterComposer">Compositor:</label>
            <select id="filterComposer"><option value="">Compositores</option></select>
        </div>

        <div class="form-group">
            <label for="filterBook">Referência:</label>
            <select id="filterBook"><option value="">Referência</option></select>
        </div>

        <div class="form-group">
            <label>Visualização:</label>
            <div class="radio-group">
                <label><input type="radio" name="viewMode" value="all" checked> Todos</label>
                <label><input type="radio" name="viewMode" value="single"> Individual</label>
            </div>
        </div>

        <button class="btn-clear" id="btnClear">Limpar Filtros</button>

        <h3>Fila de Reprodução</h3>
        <div class="playlist-vertical-container">
            <div class="playlist-actions-grid">
                <button onclick="savePlaylistToStorage()">💾 Salvar</button>
                <button onclick="exportPlaylistJSON()">📤 Exportar</button>
                <label for="fileImport" class="btn-import-label">📥 Importar</label>
                <input type="file" id="fileImport" accept=".json" onchange="importPlaylistJSON(event)">
                <button onclick="clearPlaylist()" style="background-color: #e74c3c; grid-column: span 2;">❌ Limpar Fila</button>
            </div>
            
            <div class="playlist-list" id="playlistItemsContainer">
                <div style="color: #bdc3c7; font-size: 0.8rem; text-align: center; padding: 10px;">A fila está vazia.</div>
            </div>
        </div>
    </aside>

    <div class="resizer" id="resizerLeft"></div>

    <!-- Wrapper da direita unindo o Main e o Player Horizontal -->
    <div class="main-wrapper">
        <main>
            <div class="header-main">
                <h1>NBM - Vídeos e Partituras</h1>
                <div class="header-controls">
                    <button class="btn-toggle-view" id="btnToggleView" onclick="toggleViewMode()">
                        <span id="viewIcon">▦</span> <span id="viewLabel">Grade</span>
                    </button>
                </div>
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
        </main>

        <!-- CONTAINER DO PLAYER HORIZONTAL COMPACTO -->
        <div class="player-horizontal-container" id="horizontalPlayerPanel">
            <div class="player-horizontal-info">
                <p style="font-size:0.75rem; color:#85929e; text-transform: uppercase; font-weight:bold;">Tocando Agora</p>
                <h4 id="currentPlayingTitle">Nenhuma música selecionada</h4>
                <p id="currentPlayingMeta">Escolha uma música no catálogo ou fila.</p>
            </div>
            <div class="player-horizontal-video-box">
                <div id="youtube-global-player"></div>
            </div>
        </div>
    </div>

    <div class="resizer" id="resizerRight" style="display: none;"></div>

    <section class="pdf-preview-panel" id="pdfPreviewPanel">
        <div class="pdf-preview-header">
            <h3 id="pdfPreviewTitle">Partitura</h3>
            <button class="btn-close-preview" id="btnClosePreview">&times;</button>
        </div>
        <iframe class="pdf-frame" id="pdfIframe" src=""></iframe>
    </section>

    <script src="dados.js"></script>
    <script>
        function localGetYouTubeId(url) {
            if (!url) return null;
            url = url.trim();
            if (url.length === 11) return url;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Script da API do YouTube
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const searchGeneral = document.getElementById('searchGeneral');
        const filterComposer = document.getElementById('filterComposer');
        const filterBook = document.getElementById('filterBook');
        const viewModeRadios = document.getElementsByName('viewMode');
        const catalogGrid = document.getElementById('catalogGrid');
        const btnClear = document.getElementById('btnClear');
        const playlistItemsContainer = document.getElementById('playlistItemsContainer');
        const sidebar = document.getElementById('sidebar');
        const btnToggleSidebar = document.getElementById('btnToggleSidebar');
        const pdfPreviewPanel = document.getElementById('pdfPreviewPanel');
        const resizerLeft = document.getElementById('resizerLeft');
        const resizerRight = document.getElementById('resizerRight');
        const pdfPreviewTitle = document.getElementById('pdfPreviewTitle');
        const pdfIframe = document.getElementById('pdfIframe');
        const btnClosePreview = document.getElementById('btnClosePreview');

        const currentPlayingTitle = document.getElementById('currentPlayingTitle');
        const currentPlayingMeta = document.getElementById('currentPlayingMeta');

        let globalPlayer = null;
        let userPlaylist = []; 
        let activePlaylistIndex = -1;
        let currentlyPlayingMusicId = null;
        let isListView = false;

        btnToggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            resizerLeft.style.display = sidebar.classList.contains('collapsed') ? 'none' : 'flex';
        });

        function initFilters() {
            if (typeof musicDatabase === 'undefined') return;
            const composers = [...new Set(musicDatabase.map(m => m.composer))].sort();
            const books = [...new Set(musicDatabase.map(m => m.book))].sort();
            filterComposer.innerHTML = '<option value="">Compositores</option>';
            filterBook.innerHTML = '<option value="">Referência</option>';
            composers.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; filterComposer.appendChild(opt); });
            books.forEach(b => { const opt = document.createElement('option'); opt.value = b; opt.textContent = b; filterBook.appendChild(opt); });
        }

        function getViewMode() {
            let mode = 'all';
            viewModeRadios.forEach(radio => { if (radio.checked) mode = radio.value; });
            return mode;
        }

        function openPdfPreview(title, url) {
            pdfPreviewTitle.textContent = `Partitura: ${title}`;
            pdfIframe.src = url;
            pdfPreviewPanel.style.display = 'flex';
            resizerRight.style.display = 'flex'; 
        }

        function closePdfPreview() {
            pdfPreviewPanel.style.display = 'none';
            resizerRight.style.display = 'none'; 
            pdfIframe.src = "";
        }

        function toggleViewMode() {
            isListView = !isListView;
            const icon = document.getElementById('viewIcon');
            const label = document.getElementById('viewLabel');
            
            if (isListView) {
                icon.textContent = '☰';
                label.textContent = 'Lista';
                catalogGrid.className = 'catalog-list';
            } else {
                icon.textContent = '▦';
                label.textContent = 'Grade';
                catalogGrid.className = 'catalog-grid';
            }
            renderCatalog();
        }

        function onYouTubeIframeAPIReady() {
            globalPlayer = new YT.Player('youtube-global-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'origin': window.location.origin,
                    'enablejsapi': 1,
                    'rel': 0,
                    'widget_referrer': window.location.href
                },
                events: {
                    'onStateChange': onGlobalPlayerStateChange
                }
            });
        }

        function playMusic(musicId) {
            const music = musicDatabase.find(m => m.id === musicId);
            if (!music) return;

            currentlyPlayingMusicId = musicId;
            currentPlayingTitle.textContent = music.title;
            currentPlayingMeta.textContent = `${music.composer} | ${music.book}`;

            document.querySelectorAll('.music-card').forEach(c => c.classList.remove('playing-now'));
            const card = document.getElementById(`card-${musicId}`);
            if (card) card.classList.add('playing-now');

            const ytId = localGetYouTubeId(music.youtubeUrl);
            if (ytId && globalPlayer && typeof globalPlayer.loadVideoById === 'function') {
                globalPlayer.loadVideoById(ytId);
                globalPlayer.playVideo();
            }
        }

        function onGlobalPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                let playlistIdx = userPlaylist.findIndex(id => id === currentlyPlayingMusicId);
                if(playlistIdx !== -1) {
                    activePlaylistIndex = playlistIdx;
                    updatePlaylistUI();
                }
            }
            if (event.data === YT.PlayerState.ENDED) {
                playNextInPlaylist();
            }
        }

        function addToPlaylist(musicId) {
            if (!userPlaylist.includes(musicId)) {
                userPlaylist.push(musicId);
                updatePlaylistUI();
                const btn = document.querySelector(`#card-${musicId} .btn-add-playlist`);
                if (btn) {
                    btn.textContent = '✅ Adicionado!';
                    btn.style.backgroundColor = '#27ae60';
                    setTimeout(() => {
                        btn.textContent = '➕ Adicionar à Fila';
                        btn.style.backgroundColor = '#34495e';
                    }, 1500);
                }
            }
        }

        function removeFromPlaylist(index) {
            userPlaylist.splice(index, 1);
            if (activePlaylistIndex === index) activePlaylistIndex = -1;
            else if (activePlaylistIndex > index) activePlaylistIndex--;
            updatePlaylistUI();
        }

        function clearPlaylist() {
            if (userPlaylist.length === 0) return;
            if (confirm('Tem certeza que deseja limpar a playlist?')) {
                userPlaylist = [];
                activePlaylistIndex = -1;
                updatePlaylistUI();
            }
        }

        function updatePlaylistUI() {
            playlistItemsContainer.innerHTML = "";
            if (userPlaylist.length === 0) {
                playlistItemsContainer.innerHTML = `<div style="color: #bdc3c7; font-size: 0.8rem; text-align: center; padding: 10px;">A fila está vazia.</div>`;
                return;
            }
            userPlaylist.forEach((id, index) => {
                const song = musicDatabase.find(m => m.id === id);
                if (!song) return;
                const item = document.createElement('div');
                item.className = `playlist-item ${index === activePlaylistIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="item-text" onclick="playPlaylistItem(${index})" title="${song.title}">
                        <strong>${index + 1}.</strong> ${song.title}
                    </div>
                    <span class="remove-item" onclick="removeFromPlaylist(${index})">&times;</span>
                `;
                playlistItemsContainer.appendChild(item);
            });
        }

        function playPlaylistItem(index) {
            if (index >= 0 && index < userPlaylist.length) {
                activePlaylistIndex = index;
                updatePlaylistUI();
                playMusic(userPlaylist[index]);
            }
        }

        function playNextInPlaylist() {
            if (activePlaylistIndex + 1 < userPlaylist.length) {
                playPlaylistItem(activePlaylistIndex + 1);
            }
        }

        function savePlaylistToStorage() {
            localStorage.setItem('nbm_playlist', JSON.stringify(userPlaylist));
            alert("✅ Fila de reprodução salva localmente!");
        }

        function loadPlaylistFromStorage() {
            const stored = localStorage.getItem('nbm_playlist');
            if (stored) {
                userPlaylist = JSON.parse(stored);
                updatePlaylistUI();
            }
        }

        function exportPlaylistJSON() {
            if (userPlaylist.length === 0) {
                alert('A playlist está vazia!');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(userPlaylist));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "playlist_nbm.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importPlaylistJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (Array.isArray(parsed)) {
                        userPlaylist = parsed.map(Number).filter(id => !isNaN(id));
                        activePlaylistIndex = -1;
                        updatePlaylistUI();
                        alert("✅ Playlist importada com sucesso!");
                    }
                } catch (err) { alert("❌ Erro ao ler JSON."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function renderCatalog() {
            if (typeof musicDatabase === 'undefined') return;

            const query = searchGeneral.value.toLowerCase();
            const selectedComposer = filterComposer.value;
            const selectedBook = filterBook.value;
            const mode = getViewMode();

            let filtered = musicDatabase.filter(music => {
                const matchGeneral = music.title.toLowerCase().includes(query) || music.composer.toLowerCase().includes(query) || music.book.toLowerCase().includes(query);
                const matchComposer = selectedComposer === "" || music.composer === selectedComposer;
                const matchBook = selectedBook === "" || music.book === selectedBook;
                return matchGeneral && matchComposer && matchBook;
            });

            if (mode === 'single' && filtered.length > 0) filtered = [filtered[0]];
            catalogGrid.innerHTML = "";

            if (filtered.length === 0) { 
                catalogGrid.innerHTML = `<div class="no-results">Nenhuma música encontrada.</div>`; 
                return; 
            }

            filtered.forEach(music => {
                const card = document.createElement('div');
                card.className = `music-card ${music.id === currentlyPlayingMusicId ? 'playing-now' : ''}`;
                card.id = `card-${music.id}`;
                
                const safeTitle = music.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                // Na visualização em lista, mostra apenas título e compositor na mesma linha
                const isList = isListView;
                
                card.innerHTML = `
                    <div class="music-info">
                        <h3>${music.title}</h3>
                        <div class="music-meta">
                            ${isList ? 
                                `<p>${music.composer} ${music.book ? '| ' + music.book : ''}</p>` :
                                `<p><strong>Compositor:</strong> ${music.composer}</p>
                                 <p><strong>Livro:</strong> ${music.book}</p>`
                            }
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-view-pdf" onclick="openPdfPreview('${safeTitle}', '${music.pdfUrl}')">📄 Ver Partitura</button>
                        <button class="btn-add-playlist" onclick="addToPlaylist(${music.id})">➕ Adicionar à Fila</button>
                        <button class="btn-play-now" onclick="playMusic(${music.id})">▶️ Ouvir Agora</button>
                    </div>
                `;
                catalogGrid.appendChild(card);
            });
        }

        function setupResizer(resizer, targetElement, side) {
            let startX, startWidth;
            resizer.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(targetElement).width, 10);
                resizer.classList.add('dragging');
                pdfIframe.style.pointerEvents = 'none'; 
                const doDrag = (ev) => {
                    if (side === 'left') targetElement.style.width = (startWidth + ev.clientX - startX) + 'px';
                    else if (side === 'right') targetElement.style.width = (startWidth - (ev.clientX - startX)) + 'px';
                };
                const stopDrag = () => {
                    resizer.classList.remove('dragging');
                    pdfIframe.style.pointerEvents = 'auto'; 
                    document.documentElement.removeEventListener('mousemove', doDrag);
                    document.documentElement.removeEventListener('mouseup', stopDrag);
                };
                document.documentElement.addEventListener('mousemove', doDrag);
                document.documentElement.addEventListener('mouseup', stopDrag);
            });
        }

        setupResizer(resizerLeft, sidebar, 'left');
        setupResizer(resizerRight, pdfPreviewPanel, 'right');

        searchGeneral.addEventListener('input', renderCatalog);
        filterComposer.addEventListener('change', renderCatalog);
        filterBook.addEventListener('change', renderCatalog);
        viewModeRadios.forEach(radio => radio.addEventListener('change', renderCatalog));
        btnClosePreview.addEventListener('click', closePdfPreview);
        btnClear.addEventListener('click', () => {
            searchGeneral.value = ""; filterComposer.value = ""; filterBook.value = ""; viewModeRadios[0].checked = true;
            closePdfPreview(); renderCatalog();
        });

        window.addEventListener('DOMContentLoaded', () => {
            initFilters();
            renderCatalog();
            loadPlaylistFromStorage();
        });
    </script>
</body>
</html>
