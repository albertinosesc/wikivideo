<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBM - Vídeos_Partituras</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #18bc9c;
            --bg-color: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .app-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 160px); /* Deixa espaço para a barra da playlist embaixo */
            overflow: hidden;
            position: relative;
        }

        /* Botão para Recolher/Expandir o Filtro */
        .btn-toggle-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background-color: var(--primary-color);
            color: white;
            border: 2px solid var(--accent-color);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-toggle-sidebar:hover {
            background-color: var(--accent-color);
        }

        /* Coluna Esquerda - Filtros e Busca */
        aside {
            width: 300px; 
            min-width: 240px;
            max-width: 500px;
            background-color: var(--primary-color);
            color: white;
            padding: 80px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
            flex-shrink: 0;
            transition: margin-left 0.3s ease, visibility 0.3s ease;
        }

        aside.collapsed {
            margin-left: -300px;
            visibility: hidden;
        }

        aside h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #ecf0f1;
        }

        input[type="text"], select {
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            user-select: text;
        }

        input[type="text"]:focus, select:focus {
            outline: 2px solid var(--accent-color);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: auto;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

        /* Barras de Redimensionamento (Resizers) */
        .resizer {
            width: 8px;
            background-color: #bdc3c7;
            cursor: col-resize;
            transition: background-color 0.2s;
            flex-shrink: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resizer:hover, .resizer.dragging {
            background-color: var(--accent-color);
        }

        /* Área Central - Catálogo de Músicas */
        main {
            flex: 1;
            padding: 30px 30px 30px 90px;
            overflow-y: auto;
            height: 100%;
            user-select: text;
        }

        .header-main {
            margin-bottom: 25px;
        }

        .header-main h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        /* Grid de Músicas */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .music-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            border-top: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .music-card.playing-now {
            border-top-color: #e67e22;
            background-color: #fffaf5;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.15);
        }

        .music-info h3 {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 3px;
        }

        .music-meta {
            font-size: 0.85rem;
            color: #7f8c8d;
            line-height: 1.4;
        }

        /* Mídia Embutida */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 4px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto;
        }

        .btn-view-pdf, .btn-add-playlist {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-view-pdf {
            background-color: var(--accent-color);
            color: white;
        }
        .btn-view-pdf:hover { background-color: #149a80; }

        .btn-add-playlist {
            background-color: #34495e;
            color: white;
        }
        .btn-add-playlist:hover { background-color: #212f3d; }

        /* Painel da Direita - Visualizador do PDF ativo */
        .pdf-preview-panel {
            width: 40%; 
            min-width: 300px;
            max-width: 75%;
            background-color: #2c3e50;
            display: none; 
            flex-direction: column;
            height: 100%;
            z-index: 5;
            flex-shrink: 0;
        }

        .pdf-preview-header {
            background-color: #34495e;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-preview {
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .pdf-frame { width: 100%; height: 100%; border: none; }

        /* Painel Inferior - Playlist Avançada */
        footer.playlist-panel {
            height: 160px;
            background-color: #2c3e50;
            color: white;
            border-top: 4px solid #34495e;
            display: flex;
            flex-direction: column;
            padding: 12px 20px;
            z-index: 30;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 5px;
        }

        .playlist-header h4 { font-size: 1rem; color: #18bc9c; }

        .playlist-controls {
            display: flex;
            gap: 10px;
        }

        .playlist-controls button, .btn-import-label {
            background-color: #34495e;
            color: white;
            border: 1px solid #7f8c8d;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }
        .playlist-controls button:hover, .btn-import-label:hover { background-color: var(--accent-color); }

        .playlist-items-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex: 1;
            padding-bottom: 5px;
            align-items: center;
        }

        .playlist-item {
            background-color: #34495e;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.8rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .playlist-item.active {
            border-color: #e67e22;
            background-color: #d35400;
        }

        .playlist-item .remove-item {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
        }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #7f8c8d; }
        
        #fileImport { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="Recolher/Expandir Filtros">☰ Filtros</button>

        <aside id="sidebar">
            <h2>Filtros e Busca</h2>
             
            <div class="form-group">
                <label for="searchGeneral">Pesquisa Geral:</label>
                <input type="text" id="searchGeneral" placeholder="Título, compositor, livro...">
            </div>

            <div class="form-group">
                <label for="filterComposer">Compositor:</label>
                <select id="filterComposer"><option value="">Compositores</option></select>
            </div>

            <div class="form-group">
                <label for="filterBook">Referência:</label>
                <select id="filterBook"><option value="">Referência</option></select>
            </div>

            <div class="form-group">
                <label>Visualização:</label>
                <div class="radio-group">
                    <label><input type="radio" name="viewMode" value="all" checked> Todos</label>
                    <label><input type="radio" name="viewMode" value="single"> Individual</label>
                </div>
            </div>

            <button class="btn-clear" id="btnClear">Limpar Filtros</button>
        </aside>

        <div class="resizer" id="resizerLeft"></div>

        <main>
            <div class="header-main">
                <h1>NBM - Vídeos e Partituras</h1>
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
        </main>

        <div class="resizer" id="resizerRight" style="display: none;"></div>

        <section class="pdf-preview-panel" id="pdfPreviewPanel">
            <div class="pdf-preview-header">
                <h3 id="pdfPreviewTitle">Partitura</h3>
                <button class="btn-close-preview" id="btnClosePreview">&times;</button>
            </div>
            <iframe class="pdf-frame" id="pdfIframe" src=""></iframe>
        </section>
    </div>

    <footer class="playlist-panel">
        <div class="playlist-header">
            <h4>Fila de Reprodução Autônoma</h4>
            <div class="playlist-controls">
                <button onclick="savePlaylistToStorage()">💾 Salvar Local</button>
                <button onclick="exportPlaylistJSON()">📤 Exportar JSON</button>
                <label for="fileImport" class="btn-import-label">📥 Importar JSON</label>
                <input type="file" id="fileImport" accept=".json" onchange="importPlaylistJSON(event)">
                <button onclick="clearPlaylist()" style="background-color: #e74c3c;">❌ Limpar Fila</button>
            </div>
        </div>
        <div class="playlist-items-container" id="playlistItemsContainer">
            <div style="color: #bdc3c7; font-size: 0.85rem;">Sua fila está vazia. Adicione músicas nos cards acima para iniciar.</div>
        </div>
    </footer>

    <script src="dados.js"></script>
    <script>
        // Carregamento Assíncrono Seguro do Iframe do YouTube
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const searchGeneral = document.getElementById('searchGeneral');
        const filterComposer = document.getElementById('filterComposer');
        const filterBook = document.getElementById('filterBook');
        const viewModeRadios = document.getElementsByName('viewMode');
        const catalogGrid = document.getElementById('catalogGrid');
        const btnClear = document.getElementById('btnClear');
        const playlistItemsContainer = document.getElementById('playlistItemsContainer');
        const sidebar = document.getElementById('sidebar');
        const btnToggleSidebar = document.getElementById('btnToggleSidebar');
        const pdfPreviewPanel = document.getElementById('pdfPreviewPanel');
        const resizerLeft = document.getElementById('resizerLeft');
        const resizerRight = document.getElementById('resizerRight');
        const pdfPreviewTitle = document.getElementById('pdfPreviewTitle');
        const pdfIframe = document.getElementById('pdfIframe');
        const btnClosePreview = document.getElementById('btnClosePreview');

        let youtubePlayers = {};
        let userPlaylist = []; 
        let activePlaylistIndex = -1;

        btnToggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            resizerLeft.style.display = sidebar.classList.contains('collapsed') ? 'none' : 'flex';
        });

        function initFilters() {
            const composers = [...new Set(musicDatabase.map(m => m.composer))].sort();
            const books = [...new Set(musicDatabase.map(m => m.book))].sort();
            filterComposer.innerHTML = '<option value="">Compositores</option>';
            filterBook.innerHTML = '<option value="">Referência</option>';
            composers.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; filterComposer.appendChild(opt); });
            books.forEach(b => { const opt = document.createElement('option'); opt.value = b; opt.textContent = b; filterBook.appendChild(opt); });
        }

        function getViewMode() {
            let mode = 'all';
            viewModeRadios.forEach(radio => { if (radio.checked) mode = radio.value; });
            return mode;
        }

        function openPdfPreview(title, url) {
            pdfPreviewTitle.textContent = `Partitura: ${title}`;
            pdfIframe.src = url;
            pdfPreviewPanel.style.display = 'flex';
            resizerRight.style.display = 'flex'; 
        }

        function closePdfPreview() {
            pdfPreviewPanel.style.display = 'none';
            resizerRight.style.display = 'none'; 
            pdfIframe.src = "";
        }

        // Chamada pela API do YouTube de forma automatizada externa
        function onYouTubeIframeAPIReady() {
            renderCatalog();
            loadPlaylistFromStorage();
        }

        function createYouTubePlayers() {
            youtubePlayers = {};
            const targets = document.querySelectorAll('.youtube-player-target');
            targets.forEach(target => {
                const videoId = target.getAttribute('data-video-id');
                const musicId = parseInt(target.getAttribute('data-music-id'), 10);
                
                youtubePlayers[musicId] = new YT.Player(target.id, {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    events: {
                        'onStateChange': (event) => onPlayerStateChange(event, musicId)
                    }
                });
            });
        }

        function onPlayerStateChange(event, musicId) {
            const currentCard = document.getElementById(`card-${musicId}`);
            
            if (event.data === YT.PlayerState.PLAYING) {
                document.querySelectorAll('.music-card').forEach(c => c.classList.remove('playing-now'));
                if (currentCard) currentCard.classList.add('playing-now');
                
                // Alinha o estado visual se o item estiver na playlist
                let playlistIdx = userPlaylist.findIndex(id => id === musicId);
                if(playlistIdx !== -1) {
                    activePlaylistIndex = playlistIdx;
                    updatePlaylistUI();
                }
            }

            if (event.data === YT.PlayerState.ENDED) {
                if (currentCard) currentCard.classList.remove('playing-now');
                playNextInPlaylist();
            }
        }

        // LÓGICA CORE DA PLAYLIST PERSONALIZADA
        function addToPlaylist(musicId) {
            if (!userPlaylist.includes(musicId)) {
                userPlaylist.push(musicId);
                updatePlaylistUI();
            }
        }

        function removeFromPlaylist(index) {
            userPlaylist.splice(index, 1);
            if (activePlaylistIndex === index) activePlaylistIndex = -1;
            else if (activePlaylistIndex > index) activePlaylistIndex--;
            updatePlaylistUI();
        }

        function clearPlaylist() {
            userPlaylist = [];
            activePlaylistIndex = -1;
            updatePlaylistUI();
        }

        function updatePlaylistUI() {
            playlistItemsContainer.innerHTML = "";
            if (userPlaylist.length === 0) {
                playlistItemsContainer.innerHTML = `<div style="color: #bdc3c7; font-size: 0.85rem;">Sua fila está vazia. Adicione músicas nos cards acima para iniciar.</div>`;
                return;
            }

            userPlaylist.forEach((id, index) => {
                const song = musicDatabase.find(m => m.id === id);
                if (!song) return;

                const item = document.createElement('div');
                item.className = `playlist-item ${index === activePlaylistIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span style="cursor:pointer;" onclick="playPlaylistItem(${index})">▶ <strong>${index + 1}.</strong> ${song.title}</span>
                    <span class="remove-item" onclick="removeFromPlaylist(${index})">&times;</span>
                `;
                playlistItemsContainer.appendChild(item);
            });
        }

        function playPlaylistItem(index) {
            if (index >= 0 && index < userPlaylist.length) {
                activePlaylistIndex = index;
                const musicId = userPlaylist[index];
                updatePlaylistUI();

                const card = document.getElementById(`card-${musicId}`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                if (youtubePlayers[musicId] && typeof youtubePlayers[musicId].playVideo === 'function') {
                    youtubePlayers[musicId].playVideo();
                } else {
                    alert("Para iniciar a reprodução automática por este painel, a música precisa estar visível na tela pelos seus filtros atuais.");
                }
            }
        }

        function playNextInPlaylist() {
            if (activePlaylistIndex + 1 < userPlaylist.length) {
                playPlaylistItem(activePlaylistIndex + 1);
            }
        }

        // IMPORTAÇÃO / EXPORTAÇÃO JSON & STORAGE
        function savePlaylistToStorage() {
            localStorage.setItem('nbm_playlist', JSON.stringify(userPlaylist));
            alert("Fila de reprodução salva com sucesso neste navegador!");
        }

        function loadPlaylistFromStorage() {
            const stored = localStorage.getItem('nbm_playlist');
            if (stored) {
                userPlaylist = JSON.parse(stored);
                updatePlaylistUI();
            }
        }

        function exportPlaylistJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(userPlaylist));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "playlist_nbm.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importPlaylistJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (Array.isArray(parsed)) {
                        userPlaylist = parsed.map(Number).filter(id => !isNaN(id));
                        activePlaylistIndex = -1;
                        updatePlaylistUI();
                        alert("Playlist importada com sucesso!");
                    } else {
                        alert("Arquivo JSON inválido.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo JSON.");
                }
            };
            reader.readAsText(file);
        }

        // RENDERIZAÇÃO DO CATÁLOGO
        function renderCatalog() {
            const query = searchGeneral.value.toLowerCase();
            const selectedComposer = filterComposer.value;
            const selectedBook = filterBook.value;
            const mode = getViewMode();

            let filtered = musicDatabase.filter(music => {
                const matchGeneral = music.title.toLowerCase().includes(query) || music.composer.toLowerCase().includes(query) || music.book.toLowerCase().includes(query);
                const matchComposer = selectedComposer === "" || music.composer === selectedComposer;
                const matchBook = selectedBook === "" || music.book === selectedBook;
                return matchGeneral && matchComposer && matchBook;
            });

            if (mode === 'single' && filtered.length > 0) filtered = [filtered[0]];
            catalogGrid.innerHTML = "";

            if (filtered.length === 0) { 
                catalogGrid.innerHTML = `<div class="no-results">Nenhuma música encontrada.</div>`; 
                return; 
            }

            filtered.forEach(music => {
                const youtubeId = getYouTubeId(music.youtubeUrl);

                const card = document.createElement('div');
                card.className = 'music-card';
                card.id = `card-${music.id}`;
                
                card.innerHTML = `
                    <div class="music-info">
                        <h3>${music.title}</h3>
                        <div class="music-meta">
                            <p><strong>Compositor:</strong> ${music.composer}</p>
                            <p><strong>Livro:</strong> ${music.book}</p>
                        </div>
                    </div>
                    ${youtubeId ? `
                    <div class="video-container">
                        <div id="player-${music.id}" class="youtube-player-target" data-video-id="${youtubeId}" data-music-id="${music.id}"></div>
                    </div>` : ''}
                    <div class="actions">
                        <button class="btn-view-pdf" onclick="openPdfPreview('${music.title.replace(/'/g, "\\'")}', '${music.pdfUrl}')">📄 Ver Partitura</button>
                        <button class="btn-add-playlist" onclick="addToPlaylist(${music.id})">➕ Adicionar à Playlist</button>
                    </div>
                `;
                catalogGrid.appendChild(card);
            });

            setTimeout(createYouTubePlayers, 150);
        }

        // Arrastadores Laterais
        function setupResizer(resizer, targetElement, side) {
            let startX, startWidth;
            resizer.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(targetElement).width, 10);
                resizer.classList.add('dragging');
                pdfIframe.style.pointerEvents = 'none'; 
                const doDrag = (ev) => {
                    if (side === 'left') targetElement.style.width = (startWidth + ev.clientX - startX) + 'px';
                    else if (side === 'right') targetElement.style.width = (startWidth - (ev.clientX - startX)) + 'px';
                };
                const stopDrag = () => {
                    resizer.classList.remove('dragging');
                    pdfIframe.style.pointerEvents = 'auto'; 
                    document.documentElement.removeEventListener('mousemove', doDrag);
                    document.documentElement.removeEventListener('mouseup', stopDrag);
                };
                document.documentElement.addEventListener('mousemove', doDrag);
                document.documentElement.addEventListener('mouseup', stopDrag);
            });
        }

        setupResizer(resizerLeft, sidebar, 'left');
        setupResizer(resizerRight, pdfPreviewPanel, 'right');

        searchGeneral.addEventListener('input', renderCatalog);
        filterComposer.addEventListener('change', renderCatalog);
        filterBook.addEventListener('change', renderCatalog);
        viewModeRadios.forEach(radio => radio.addEventListener('change', renderCatalog));
        btnClosePreview.addEventListener('click', closePdfPreview);
        btnClear.addEventListener('click', () => {
            searchGeneral.value = ""; filterComposer.value = ""; filterBook.value = ""; viewModeRadios[0].checked = true;
            closePdfPreview(); renderCatalog();
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof musicDatabase !== 'undefined' && typeof getYouTubeId !== 'undefined') {
                initFilters();
            }
        });
    </script>
</body>
</html>
